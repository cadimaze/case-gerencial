<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Gente Vai de Turma — O Incidente em Produção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <img src="assets/itau.png" class="brand" alt="" onerror="this.style.display='none'" />

  <button id="btn-fullscreen" class="fullscreen-btn" title="Tela cheia">⛶</button>

  <div class="stars" id="stars"></div>

  <main id="app" class="app">
    <!-- Telas injetadas via JavaScript -->
  </main>

  <!-- HUD — barra de vida do incidente (aparece durante as perguntas) -->
  <div id="hud" class="hud hidden">
    <div class="hud-label">❤️ Vida do Incidente</div>
    <div class="hud-bar-wrap">
      <div class="hud-bar" id="hud-bar"></div>
    </div>
    <div class="hud-value"><span id="hud-value">300</span> HP</div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
